<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>East & Southern Africa Weather</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      background: linear-gradient(160deg, #0f172a 0%, #1e3a5f 100%);
      color: #f8fafc;
      padding: 2rem 1.5rem;
    }
    .header { text-align: center; margin-bottom: 1.5rem; }
    .label {
      font-size: 0.85rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      opacity: 0.75;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 1rem;
      max-width: 960px;
      margin: 0 auto;
    }
    .card {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 16px;
      padding: 1.5rem;
      text-align: center;
      backdrop-filter: blur(8px);
    }
    .city { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.25rem; }
    .temp { font-size: 2.75rem; font-weight: 800; line-height: 1; margin: 0.5rem 0; }
    .desc {
      font-size: 1rem;
      text-transform: capitalize;
      opacity: 0.9;
      margin-bottom: 1rem;
    }
    .meta {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.5rem;
      font-size: 0.9rem;
    }
    .meta div {
      background: rgba(0, 0, 0, 0.2);
      border-radius: 8px;
      padding: 0.5rem;
    }
    .meta span { display: block; opacity: 0.7; font-size: 0.75rem; }
    .error { color: #fecaca; text-align: center; line-height: 1.5; }
    .loading { text-align: center; opacity: 0.8; }
  </style>
</head>
<body>
  <div class="header">
    <p class="label">Exercise 4 · OpenWeather API</p>
  </div>
  <div id="content" class="loading">Loading weather for Nairobi, Kampala & Johannesburg…</div>
  <script>
    const el = document.getElementById("content");

    function card(d) {
      return `
        <div class="card">
          <div class="city">${d.city}</div>
          <div class="temp">${Math.round(d.temp)}°C</div>
          <div class="desc">${d.description}</div>
          <div class="meta">
            <div><span>Feels like</span>${Math.round(d.feels_like)}°C</div>
            <div><span>Humidity</span>${d.humidity}%</div>
          </div>
        </div>`;
    }

    fetch("/api/weather")
      .then((r) => {
        if (!r.ok) throw new Error("API request failed (" + r.status + ")");
        return r.json();
      })
      .then((data) => {
        if (data.error) throw new Error(data.error);
        const cities = Array.isArray(data) ? data : [data];
        el.className = "grid";
        el.innerHTML = cities.map(card).join("");
      })
      .catch((err) => {
        el.className = "error";
        el.innerHTML = `${err.message}<br>Check that OPENWEATHER_API_KEY is set on the server.`;
      });
  </script>
</body>
</html>
