<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>East & Southern Africa Weather</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      background: linear-gradient(160deg, #0f172a 0%, #1e3a5f 100%);
      color: #f8fafc;
      padding: 2rem 1.5rem;
    }
    .header { text-align: center; margin-bottom: 1.5rem; }
    .label {
      font-size: 0.85rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      opacity: 0.75;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 1rem;
      max-width: 960px;
      margin: 0 auto;
    }
    .card {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 16px;
      padding: 1.5rem;
      text-align: center;
      backdrop-filter: blur(8px);
    }
    .city { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.25rem; }
    .temp { font-size: 2.75rem; font-weight: 800; line-height: 1; margin: 0.5rem 0; }
    .desc {
      font-size: 1rem;
      text-transform: capitalize;
      opacity: 0.9;
      margin-bottom: 1rem;
    }
    .meta {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.5rem;
      font-size: 0.9rem;
    }
    .meta div {
      background: rgba(0, 0, 0, 0.2);
      border-radius: 8px;
      padding: 0.5rem;
    }
    .meta span { display: block; opacity: 0.7; font-size: 0.75rem; }
    .error { color: #fecaca; text-align: center; line-height: 1.5; }
    .loading { text-align: center; opacity: 0.8; }
    .actions {
      text-align: center;
      margin-top: 2rem;
      max-width: 960px;
      margin-left: auto;
      margin-right: auto;
    }
    .exercise-btn {
      display: inline-block;
      padding: 0.85rem 2rem;
      background: #2563eb;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      text-decoration: none;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      transition: background 0.2s;
    }
    .exercise-btn:hover { background: #1d4ed8; }
  </style>
</head>
<body>
  <div class="header">
    <p class="label">Exercise 4 · OpenWeather API</p>
  </div>
  <div id="content" class="loading">Loading weather for Nairobi, Kampala & Johannesburg…</div>
  <div id="actions" class="actions" style="display: none;">
    <a href="/exercise.html" class="exercise-btn">Exercise</a>
  </div>
  <script>
    const el = document.getElementById("content");
    const actions = document.getElementById("actions");

    function card(d) {
      return `
        <div class="card">
          <div class="city">${d.city}</div>
          <div class="temp">${Math.round(d.temp)}°C</div>
          <div class="desc">${d.description}</div>
          <div class="meta">
            <div><span>Feels like</span>${Math.round(d.feels_like)}°C</div>
            <div><span>Humidity</span>${d.humidity}%</div>
          </div>
        </div>`;
    }

    fetch("/api/weather", { signal: AbortSignal.timeout(15000) })
      .then((r) => r.json().then((data) => ({ ok: r.ok, data })))
      .then(({ ok, data }) => {
        if (!ok || data.error) throw new Error(data.error || "API request failed");
        const cities = Array.isArray(data) ? data : [data];
        el.className = "grid";
        el.innerHTML = cities.map(card).join("");
        actions.style.display = "block";
      })
      .catch((err) => {
        el.className = "error";
        const msg =
          err.name === "TimeoutError"
            ? "API timed out — check /api/health on Vercel and redeploy."
            : err.message;
        el.innerHTML =
          msg +
          "<br><br>1. Vercel → Settings → Environment Variables → OPENWEATHER_API_KEY<br>2. Redeploy<br>3. Test: /api/health";
      });
  </script>
</body>
</html>
